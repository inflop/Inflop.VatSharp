version: 2
updates:
  - package-ecosystem: nuget
    directory: /src/Inflop.VatSharp
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: nuget
    directory: /tests/Inflop.VatSharp.Tests
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
