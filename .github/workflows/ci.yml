name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0.x', '9.0.x', '10.0.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - run: dotnet restore src/Inflop.VatSharp.slnx
      - run: dotnet build src/Inflop.VatSharp.slnx --no-restore --configuration Release
      - run: dotnet test src/Inflop.VatSharp.slnx --no-build --configuration Release --verbosity normal
