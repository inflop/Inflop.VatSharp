name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore src/Inflop.VatSharp.slnx

      - run: dotnet build src/Inflop.VatSharp.slnx --no-restore --configuration Release

      - run: dotnet test src/Inflop.VatSharp.slnx --no-build --configuration Release --verbosity normal
