name: Publish to NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore src/Inflop.VatSharp.slnx
      - run: dotnet build src/Inflop.VatSharp.slnx --configuration Release --no-restore
      - run: dotnet test src/Inflop.VatSharp.slnx --configuration Release --no-restore --verbosity normal
      - run: dotnet pack src/Inflop.VatSharp/Inflop.VatSharp.csproj --configuration Release --no-restore --output ./nupkg
      - run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
